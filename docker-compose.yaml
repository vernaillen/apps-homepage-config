services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest   # base image; mounts shadow any baked config anyway
    container_name: homepage-dev
    ports:
      - "3001:3000"
    environment:
      HOMEPAGE_ALLOWED_HOSTS: localhost:3001
    env_file:
      - .env
    volumes:
      - ./config:/app/config
      - ./images:/app/public/images